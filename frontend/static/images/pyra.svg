  <!-- base unrounded path for a single triangle cubelet -->
  <!-- side length 166.66 (=500/3)-->
  <!-- M 0 -72.1687 L -83.333 72.1687 L 83.333 72.1687 Z --> <!-- pointing up -->
  <!-- M 0 72.1687 L -83.333 -72.1687 L 83.333 -72.1687 Z --> <!-- pointing down -->

  <g transform="translate(0,470)">
    <!-- just to have as a frame for the cubelets, this is the whole face -->
    <!-- comment this out after we figure out each cubelet -->
    <path d="M 0 0 L 500 0 L 250 -433 Z" fill="var(--color-white)"/>

    <!-- bottom row left-to-right #1/5 -->
    <g transform="translate(83.33, -72.1687)">
      <path d="M 0 -72.1687 L -83.333 72.1687 L 83.333 72.1687 Z" fill="var(--color-blue)"/>
    </g>
    <!-- bottom row left-to-right #2/5 -->
    <g transform="translate(166.66, -72.1687)">
      <path d="M 0 72.1687 L -83.333 -72.1687 L 83.333 -72.1687 Z" fill="var(--color-orange)"/>
    </g>
    <!-- bottom row left-to-right #3/5 -->
    <g transform="translate(250, -72.1687)">
      <path d="M 0 -72.1687 L -83.333 72.1687 L 83.333 72.1687 Z" fill="var(--color-red)"/>
    </g>
    <!-- bottom row left-to-right #4/5 -->
    <g transform="translate(333.33, -72.1687)">
      <path d="M 0 72.1687 L -83.333 -72.1687 L 83.333 -72.1687 Z" fill="var(--color-orange)"/>
    </g>
    <!-- bottom row left-to-right #5/5 -->
    <g transform="translate(416.66, -72.1687)">
      <path d="M 0 -72.1687 L -83.333 72.1687 L 83.333 72.1687 Z" fill="var(--color-green)"/>
    </g>
    <!-- middle row left-to-right #1/3 -->
    <g transform="translate(166.66, -216.5057)">
      <path d="M 0 -72.1687 L -83.333 72.1687 L 83.333 72.1687 Z" fill="var(--color-green)"/>
    </g>
    <!-- middle row left-to-right #2/3 -->
    <g transform="translate(250, -216.5057)">
      <path d="M 0 72.1687 L -83.333 -72.1687 L 83.333 -72.1687 Z" fill="var(--color-orange)"/>
    </g>
    <!-- middle row left-to-right #3/3 -->
    <g transform="translate(333.33, -216.5057)">
      <path d="M 0 -72.1687 L -83.333 72.1687 L 83.333 72.1687 Z" fill="var(--color-blue)"/>
    </g>
    <!-- top #1/1 -->
    <g transform="translate(250, -360.8427)">
      <path d="M 0 -72.1687 L -83.333 72.1687 L 83.333 72.1687 Z" fill="var(--color-red)"/>
    </g>
  </g>





