    <!-- 
import math

def ring_segment_path(cx=100, cy=100, outer_radius=88, inner_radius=56,
                      start_deg=320, end_deg=40):
    """
    Build an SVG path string for a filled ring segment ("C").
    Angles are in degrees, measured clockwise from the +X axis.
    """

    def to_xy(r, deg):
        t = math.radians(deg)
        return (cx + r * math.cos(t),
                cy + r * math.sin(t))

    # Compute whether arc > 180°
    delta_cw = (end_deg - start_deg) % 360
    large_arc = 1 if delta_cw > 180 else 0

    # Coordinates
    x0, y0 = to_xy(outer_radius, start_deg)  # outer start
    x1, y1 = to_xy(outer_radius, end_deg)    # outer end
    x2, y2 = to_xy(inner_radius, end_deg)    # inner start
    x3, y3 = to_xy(inner_radius, start_deg)  # inner end

    d = [
        f"M {x0:.4f} {y0:.4f}",
        f"           A {outer_radius} {outer_radius} 0 {large_arc} 1 {x1:.4f} {y1:.4f}",
        f"           L {x2:.4f} {y2:.4f}",
        f"           A {inner_radius} {inner_radius} 0 {large_arc} 0 {x3:.4f} {y3:.4f}",
        "           Z"
    ]
    return "\n".join(d)


def path(d, color):
    print(f"""
    <path
        d="{d}"
        fill="var({color})"
    />
    """)

def gen():
    # inner and outer radius of the main letter C
    orx = 92
    irx = 52

    # start and ending degrees of the letter C
    start = 40
    end = 320

    # radius delta of blocks inside the letter
    drx = 6
    drx = 0

    # degrees in between blocks
    sep_deg = 8
    sep_deg = 0

    # width of blocks in degrees
    w_deg = 25
    w_deg = 30

    path(
      ring_segment_path(outer_radius=orx, inner_radius=irx, start_deg=start, end_deg=end),
      '-' + '-innard'
    )

    colors = ['color-blue', 'color-green', 'color-white']
    for i in range(3):
        bstart = start + sep_deg + i*(sep_deg+w_deg)
        bend = bstart + w_deg
        path(
          ring_segment_path(
            outer_radius=orx-drx,
            inner_radius=irx+drx,
            start_deg=bstart,
            end_deg=bend
          ),
          '-' + '-' + colors[i]
        )

    colors = ['color-red', 'color-orange', 'color-yellow']
    for i in range(3):
        bend = end - sep_deg - i*(sep_deg+w_deg)
        bstart = bend - w_deg
        path(
          ring_segment_path(
            outer_radius=orx-drx,
            inner_radius=irx+drx,
            start_deg=bstart,
            end_deg=bend
          ),
          '-' + '-' + colors[i]
        )
    -->

