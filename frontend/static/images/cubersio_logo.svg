<svg viewBox="0 0 200 200" width="300" height="300" xmlns="http://www.w3.org/2000/svg">
    <style>
        :root {
          --innard: #000000;
        }
    </style>

    <defs>
        <!-- Drop shadow applied to the whole C group -->
        <filter id="c-shadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
            <feOffset dx="2" dy="4" result="offset"/>
            <feFlood flood-color="#000000" flood-opacity="0.65" result="color"/>
            <feComposite in="color" in2="offset" operator="in" result="shadow"/>
            <feMerge>
                <feMergeNode in="shadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Gloss highlight: diagonal gradient simulating a top-left light source -->
        <linearGradient id="gloss" x1="0.1" y1="0" x2="0.75" y2="1" gradientUnits="objectBoundingBox">
            <stop offset="0%"   stop-color="white" stop-opacity="0.38"/>
            <stop offset="35%"  stop-color="white" stop-opacity="0.10"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>

        <!--
            Per-color radial gradients centered at the arc center (100,100).
            r="92" = outer ring. The sticker band runs from r=52 (56.5%) to r=92 (100%).
            Each gradient goes lighter at the inner edge → slightly darker at the outer edge.
        -->
        <radialGradient id="grad-red" cx="100" cy="100" r="92" gradientUnits="userSpaceOnUse">
            <stop offset="56%" stop-color="#ff9898"/>
            <stop offset="100%" stop-color="#f25050"/>
        </radialGradient>
        <radialGradient id="grad-yellow" cx="100" cy="100" r="92" gradientUnits="userSpaceOnUse">
            <stop offset="56%" stop-color="#faffaa"/>
            <stop offset="100%" stop-color="#e8f550"/>
        </radialGradient>
        <radialGradient id="grad-blue" cx="100" cy="100" r="92" gradientUnits="userSpaceOnUse">
            <stop offset="56%" stop-color="#88c8ff"/>
            <stop offset="100%" stop-color="#4a8ef5"/>
        </radialGradient>
        <radialGradient id="grad-white" cx="100" cy="100" r="92" gradientUnits="userSpaceOnUse">
            <stop offset="56%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#dedede"/>
        </radialGradient>
        <radialGradient id="grad-green" cx="100" cy="100" r="92" gradientUnits="userSpaceOnUse">
            <stop offset="56%" stop-color="#90ffaa"/>
            <stop offset="100%" stop-color="#50e860"/>
        </radialGradient>
        <radialGradient id="grad-orange" cx="100" cy="100" r="92" gradientUnits="userSpaceOnUse">
            <stop offset="56%" stop-color="#ffd090"/>
            <stop offset="100%" stop-color="#f0a840"/>
        </radialGradient>

        <!-- Clip path for the gloss overlay -->
        <clipPath id="c-clip">
            <path d="M 170.4761 159.1365
                     A 92 92 0 1 1 170.4761 40.8635
                     L 139.8343 66.5750
                     A 52 52 0 1 0 139.8343 133.4250
                     Z"/>
        </clipPath>
    </defs>

    <g filter="url(#c-shadow)">

        <!-- Dark C background -->
        <path
            d="M 170.4761 159.1365
               A 92 92 0 1 1 170.4761 40.8635
               L 139.8343 66.5750
               A 52 52 0 1 0 139.8343 133.4250
               Z"
            fill="var(--innard)"
        />

        <!-- 9 evenly-spaced stickers, each 31.111° wide -->

        <!-- red (40.000° to 71.111°) -->
        <path d="M 170.4761 159.1365
           A 92 92 0 0 1 129.7835 187.0456
           L 116.8342 149.1997
           A 52 52 0 0 0 139.8343 133.4250
           Z" fill="url(#grad-red)"/>

        <!-- blue (71.111° to 102.222°) -->
        <path d="M 129.7835 187.0456
           A 92 92 0 0 1 80.5232 189.9147
           L 88.9914 150.8214
           A 52 52 0 0 0 116.8342 149.1997
           Z" fill="url(#grad-blue)"/>

        <!-- yellow (102.222° to 133.333°) -->
        <path d="M 80.5232 189.9147
           A 92 92 0 0 1 36.8658 166.9184
           L 64.3154 137.8234
           A 52 52 0 0 0 88.9914 150.8214
           Z" fill="url(#grad-yellow)"/>

        <!-- green (133.333° to 164.444°) -->
        <path d="M 36.8658 166.9184
           A 92 92 0 0 1 11.3699 124.6719
           L 49.9047 113.9450
           A 52 52 0 0 0 64.3154 137.8234
           Z" fill="url(#grad-green)"/>

        <!-- white (164.444° to 195.556°) -->
        <path d="M 11.3699 124.6719
           A 92 92 0 0 1 11.3699 75.3281
           L 49.9047 86.0550
           A 52 52 0 0 0 49.9047 113.9450
           Z" fill="url(#grad-white)"/>

        <!-- orange (195.556° to 226.667°) -->
        <path d="M 11.3699 75.3281
           A 92 92 0 0 1 36.8658 33.0816
           L 64.3154 62.1766
           A 52 52 0 0 0 49.9047 86.0550
           Z" fill="url(#grad-orange)"/>

        <!-- green (226.667° to 257.778°) -->
        <path d="M 36.8658 33.0816
           A 92 92 0 0 1 80.5232 10.0853
           L 88.9914 49.1786
           A 52 52 0 0 0 64.3154 62.1766
           Z" fill="url(#grad-green)"/>

        <!-- red (257.778° to 288.889°) -->
        <path d="M 80.5232 10.0853
           A 92 92 0 0 1 129.7835 12.9544
           L 116.8342 50.8003
           A 52 52 0 0 0 88.9914 49.1786
           Z" fill="url(#grad-red)"/>

        <!-- blue (288.889° to 320.000°) -->
        <path d="M 129.7835 12.9544
           A 92 92 0 0 1 170.4761 40.8635
           L 139.8343 66.5750
           A 52 52 0 0 0 116.8342 50.8003
           Z" fill="url(#grad-blue)"/>

    </g>

    <!-- Gloss overlay — outside shadow group so it sits on top clean -->
    <path
        d="M 170.4761 159.1365
           A 92 92 0 1 1 170.4761 40.8635
           L 139.8343 66.5750
           A 52 52 0 1 0 139.8343 133.4250
           Z"
        fill="url(#gloss)"
        clip-path="url(#c-clip)"
    />

    <!-- Divider strokes and outline drawn after the gloss so they are unaffected by it -->
    <line x1="118.4528" y1="153.9304" x2="128.1649" y2="182.3149"
          stroke="var(--innard)" stroke-width="7" stroke-linecap="round"/>
    <line x1="87.9329"  y1="155.7080" x2="81.5818"  y2="185.0280"
          stroke="var(--innard)" stroke-width="7" stroke-linecap="round"/>
    <line x1="60.8842"  y1="141.4603" x2="40.2970"  y2="163.2815"
          stroke="var(--innard)" stroke-width="7" stroke-linecap="round"/>
    <line x1="45.0879"  y1="115.2858" x2="16.1867"  y2="123.3310"
          stroke="var(--innard)" stroke-width="7" stroke-linecap="round"/>
    <line x1="45.0879"  y1="84.7142"  x2="16.1867"  y2="76.6690"
          stroke="var(--innard)" stroke-width="7" stroke-linecap="round"/>
    <line x1="60.8842"  y1="58.5397"  x2="40.2970"  y2="36.7185"
          stroke="var(--innard)" stroke-width="7" stroke-linecap="round"/>
    <line x1="87.9329"  y1="44.2920"  x2="81.5818"  y2="14.9720"
          stroke="var(--innard)" stroke-width="7" stroke-linecap="round"/>
    <line x1="118.4528" y1="46.0696"  x2="128.1649" y2="17.6851"
          stroke="var(--innard)" stroke-width="7" stroke-linecap="round"/>
    <path
        d="M 170.4761 159.1365
           A 92 92 0 1 1 170.4761 40.8635
           L 139.8343 66.5750
           A 52 52 0 1 0 139.8343 133.4250
           Z"
        fill="none"
        stroke="var(--innard)"
        stroke-width="6"
    />

</svg>
