<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <!-- 
      Top Row Gradient: Blue (Top-Left) to Green (Top-Right)
    -->
    <linearGradient id="topColors" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4557f5" />
      <stop offset="10%" stop-color="#4557f5" />
      <stop offset="90%" stop-color="#54fd64" />
      <stop offset="100%" stop-color="#54fd64" />
    </linearGradient>

    <!-- 
      Bottom Row Gradient: Red (Bottom-Left) to Orange (Bottom-Right)
      This follows the clockwise requirement: TL (Blue), TR (Green), BR (Orange), BL (Red).
    -->
    <linearGradient id="bottomColors" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f45e5e" />
      <stop offset="10%" stop-color="#f45e5e" />
      <stop offset="90%" stop-color="#f8b468" />
      <stop offset="100%" stop-color="#f8b468" />
    </linearGradient>

    <!-- 
      Vertical Mask Gradient
      We use this to seamlessly blend the top row (Layer 1) and the bottom row (Layer 2)
      exactly in the vertical middle of the canvas (between 10% and 90%).
    -->
    <linearGradient id="verticalMask" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="10%" stop-color="#000000" />
      <stop offset="90%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <mask id="blendMask">
      <rect width="100%" height="100%" fill="url(#verticalMask)" />
    </mask>

    <!-- Clip grid lines to the rounded rect boundary -->
    <clipPath id="rounded-clip">
      <rect x="0" y="0" width="1000" height="1000" rx="150" />
    </clipPath>

    <!-- Drop shadow to elevate the "C" off the background -->
    <filter id="c-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="25" stdDeviation="45" flood-color="#000000" flood-opacity="0.55" />
    </filter>

    <style>
        /* Exclusively importing and using Merriweather from Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@700&amp;display=swap');

        .center-text {
          font-family: 'Merriweather', serif;
          font-size: 800px;
          font-weight: bold;
          fill: #ffffff;
        }
      </style>
  </defs>

  <!-- Base Layer: Top Colors (Blue & Green) -->
  <rect width="100%" height="100%" rx="150" fill="url(#topColors)" />

  <!-- Overlay Layer: Bottom Colors (Red & Orange) -->
  <!-- The mask conceals the top part (showing Layer 1) and reveals the bottom part (showing Layer
  2) -->
  <rect width="100%" height="100%" rx="150" fill="url(#bottomColors)" mask="url(#blendMask)" />


  <!-- The Letter C -->
  <text
    x="500"
    y="500"
    class="center-text"
    text-anchor="middle"
    dominant-baseline="central"
    stroke="#ffffff"
    stroke-width="35"
    stroke-opacity="10"
    paint-order="stroke fill"
    filter="url(#c-shadow)">C</text>
</svg>